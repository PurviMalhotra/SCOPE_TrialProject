services:
  postgres:
    image: postgres:16-alpine
    container_name: scope-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scope_dev_2026}
      POSTGRES_DB: ${DB_NAME:-scope_event_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/database/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scope_event_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: scope-backend
    environment:
      PORT: 5500
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5170}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      ENABLE_DEV_AUTH: ${ENABLE_DEV_AUTH:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:5500/api/auth/google/callback}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      REDIS_URL: redis://redis:6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-scope_event_db}
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-scope_dev_2026}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-scope-uploads}
      MINIO_PUBLIC_BASE_URL: http://localhost:9000
    ports:
      - "5500:5500"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  resume-worker:
    build:
      context: ./backend
    container_name: scope-resume-worker
    command: npm run worker:resume
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      REDIS_URL: redis://redis:6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-scope_event_db}
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-scope_dev_2026}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-scope-uploads}
      MINIO_PUBLIC_BASE_URL: http://localhost:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: scope-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: scope-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
